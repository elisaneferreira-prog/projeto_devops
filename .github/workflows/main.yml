name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - teste-final
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Rodar código
        run: python main.py

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy (simulado)
        run: echo "Deploy feito com sucesso 🚀"
